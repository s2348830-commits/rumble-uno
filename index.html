<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自作UNO</title>
    <link rel="stylesheet" href="style.css?v=25">

<body>


<div id="manual-overlay" class="hidden">
    <div class="manual-content">

        </div>

                <div style="text-align: center; font-size: 12px; color: #aaa;">部屋を検索中...</div>

</div>

<div id="lobby-screen" class="screen-container hidden">
    <div class="lobby-box">
        <div class="volume-container lobby-volume">
            <span class="volume-icon">🔈</span>
            <input type="range" class="volume-slider" min="0" max="100" value="50">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px; margin-bottom: 20px;">
            <div style="display: flex; flex-direction: column; gap: 5px; align-items: flex-start;">

                <div id="btn-room-visibility" class="btn-chat-toggle is-on" style="position: static; padding: 6px 10px; margin: 0; font-size: 11px; width: 100%; box-sizing: border-box; text-align: center;">部屋表示: ON</div>

            <h2 class="room-id-title" style="margin: 0; font-size: 16px; flex-grow: 1; text-align: center;">
                Room ID: <span id="display-room-id" style="color: #fbc02d;">----</span>

        </div>

            <button id="btn-ready" class="ready-btn hidden">準備完了</button>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const lInput = document.getElementById('lobby-chat-input');
    const lBtn = document.getElementById('btn-lobby-chat-send');
    const sendLobbyMsg = () => {
        if (!lInput) return;
        const msg = lInput.value.trim();
        if (msg && window.socket && window.currentRoomState) {
            window.socket.emit('send_chat', { roomId: window.currentRoomState.id, message: msg, senderName: window.myData ? window.myData.name : 'Unknown' });
            lInput.value = '';
        }
    };
    if (lBtn) lBtn.onclick = sendLobbyMsg;
    if (lInput) lInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendLobbyMsg(); });

    const lobbyToggle = document.getElementById('btn-lobby-chat-toggle');
    const lobbyChatContainer = document.getElementById('lobby-chat-container');
    if (lobbyToggle && lobbyChatContainer) {
        lobbyToggle.addEventListener('click', () => {
            setTimeout(() => {
                if (window.ChatManager && window.ChatManager.enabled) {
                    lobbyChatContainer.style.display = 'block';
                } else {
                    lobbyChatContainer.style.display = 'none';
                }
            }, 50);
        });
    }
});
</script>

<script>
window.readonlyClickHandler = function(e) {
    // 閉じるボタン系（idやclassにcloseが含まれるもの）は操作を許可
    const isClose = e.target.closest('button, .close-btn, [id*="close"], [class*="close"]');
    // カスタムカード画面を開くボタンは操作を許可
    const isOpenCustomCards = e.target.closest('#btn-open-custom-cards');
    
    if (isClose || isOpenCustomCards) return; // 許可されたボタンなら通常通り処理させる
    
    // それ以外の場所（能力カード一覧、+ / -ボタン、チェックボックスなど）のクリックはすべて強制無効化！
    e.stopPropagation();
    e.preventDefault();
};

window.showReadonlySettings = function() {
    let style = document.getElementById('readonly-style-guard');
    if (!style) {
        style = document.createElement('style');
        style.id = 'readonly-style-guard';
        style.innerHTML = `
            /* フォーム要素をグレーアウトして視覚的に触れないことをアピール */
            #start-overlay input, #setting-overlay input, #custom-card-overlay input,
            #start-overlay select, #setting-overlay select, #custom-card-overlay select {
                pointer-events: none !important;
                opacity: 0.6 !important;
            }
            /* 能力カードの+ / -ボタンや追加ボタンなどを完全に非表示にする */
            #start-overlay .count-btn, #setting-overlay .count-btn, #custom-card-overlay .count-btn,
            #start-overlay .add-btn, #setting-overlay .add-btn, #custom-card-overlay .add-btn {
                display: none !important;
            }
            /* カード画像のクリック判定を消す */
            #start-overlay img, #setting-overlay img, #custom-card-overlay img {
                pointer-events: none !important;
            }
        `;
        document.head.appendChild(style);
    }

    // 関連するすべての設定画面に「クリック強制無効化」の監視をつける
    ['start-overlay', 'setting-overlay', 'custom-card-overlay'].forEach(id => {
        const overlay = document.getElementById(id);
        if (overlay) {
            // 画面内でのクリックイベントを最優先(キャプチャフェーズ)で横取りしてブロック！
            overlay.addEventListener('click', window.readonlyClickHandler, true);
        }
    });

    // メインのルール設定画面を開く
    const startOverlay = document.getElementById('start-overlay');
    if (startOverlay) startOverlay.classList.remove('hidden');
};

window.restoreSettingsUI = function() {
    const style = document.getElementById('readonly-style-guard');
    if (style) style.remove();

    ['start-overlay', 'setting-overlay', 'custom-card-overlay'].forEach(id => {
        const overlay = document.getElementById(id);
        if (overlay) {
            // ロビーに戻ったらブロック機能を解除して編集可能に戻す
            overlay.removeEventListener('click', window.readonlyClickHandler, true);
        }
    });
};
